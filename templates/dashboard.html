<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainSprouts - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <span class="nav-brand">BrainSprouts</span>
        </div>
        <div class="nav-right">
            <span class="nav-hours-badge" id="navHours" title="Total hours logged">0.0h</span>
            <span class="nav-user" id="navUser"></span>
            <button class="btn btn-ghost" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <!-- Title Card (right side) -->
    <div class="title-card" id="titleCard">
        <div class="title-card-label">Executive Level</div>
        <div class="title-card-value" id="titleCardValue">Jr. Tutor</div>
        <div class="title-card-name" id="titleCardName"></div>
    </div>

    <!-- Mascot (left side) -->
    <div class="mascot-container">
        <div class="mascot-bubble">Please sign up for an event! $5 Monopoly money if you do</div>
        <svg class="mascot-panda" viewBox="0 0 200 220" width="140" xmlns="http://www.w3.org/2000/svg">
            <!-- Body -->
            <ellipse cx="100" cy="160" rx="55" ry="50" fill="#c0542b"/>
            <!-- Belly -->
            <ellipse cx="100" cy="168" rx="35" ry="32" fill="#e8a87c"/>
            <!-- Head -->
            <circle cx="100" cy="90" r="45" fill="#c0542b"/>
            <!-- Face mask -->
            <ellipse cx="100" cy="98" rx="32" ry="26" fill="#e8a87c"/>
            <!-- Ears -->
            <circle cx="65" cy="58" r="16" fill="#c0542b"/>
            <circle cx="135" cy="58" r="16" fill="#c0542b"/>
            <circle cx="65" cy="58" r="10" fill="#8b3a1a"/>
            <circle cx="135" cy="58" r="10" fill="#8b3a1a"/>
            <!-- Eye patches (dark) -->
            <ellipse cx="82" cy="86" rx="14" ry="12" fill="#8b3a1a"/>
            <ellipse cx="118" cy="86" rx="14" ry="12" fill="#8b3a1a"/>
            <!-- Eyes (white + pupil) -->
            <circle cx="82" cy="86" r="7" fill="white"/>
            <circle cx="118" cy="86" r="7" fill="white"/>
            <circle cx="84" cy="85" r="4" fill="#1a1a1a"/>
            <circle cx="120" cy="85" r="4" fill="#1a1a1a"/>
            <circle cx="85" cy="84" r="1.5" fill="white"/>
            <circle cx="121" cy="84" r="1.5" fill="white"/>
            <!-- Nose -->
            <ellipse cx="100" cy="100" rx="5" ry="3.5" fill="#1a1a1a"/>
            <!-- Mouth -->
            <path d="M95 105 Q100 111 105 105" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <!-- Cheek marks -->
            <line x1="60" y1="93" x2="72" y2="95" stroke="#e8a87c" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="60" y1="97" x2="72" y2="98" stroke="#e8a87c" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="128" y1="95" x2="140" y2="93" stroke="#e8a87c" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="128" y1="98" x2="140" y2="97" stroke="#e8a87c" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Tail -->
            <path d="M45 155 Q20 130 35 110 Q50 95 55 115 Q58 130 50 145" fill="#c0542b" stroke="#8b3a1a" stroke-width="1"/>
            <path d="M40 120 Q48 115 45 130" fill="#e8a87c" stroke="none"/>
            <!-- Tail stripes -->
            <path d="M33 115 Q42 110 48 118" stroke="#8b3a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M38 125 Q46 120 50 130" stroke="#8b3a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <!-- Feet -->
            <ellipse cx="75" cy="205" rx="18" ry="10" fill="#8b3a1a"/>
            <ellipse cx="125" cy="205" rx="18" ry="10" fill="#8b3a1a"/>
            <!-- Arms -->
            <ellipse cx="55" cy="155" rx="12" ry="22" fill="#c0542b" transform="rotate(15 55 155)"/>
            <ellipse cx="145" cy="155" rx="12" ry="22" fill="#c0542b" transform="rotate(-15 145 155)"/>
            <!-- Sprout! -->
            <line x1="100" y1="48" x2="100" y2="22" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
            <ellipse cx="92" cy="20" rx="8" ry="12" fill="#22c55e" transform="rotate(-30 92 20)"/>
            <ellipse cx="108" cy="20" rx="8" ry="12" fill="#22c55e" transform="rotate(30 108 20)"/>
            <ellipse cx="100" cy="15" rx="6" ry="10" fill="#4ade80"/>
        </svg>
    </div>

    <main class="container">
        <div id="announcementsBanner"></div>

        <div class="page-header">
            <h2>Your Schedule</h2>
            <p class="text-muted">Mark your availability for upcoming sessions below.</p>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <!-- Populated by JS -->
        </div>

        <!-- My Hours Section -->
        <div style="margin-top:40px;">
            <div class="page-header">
                <h2>My Hours</h2>
                <p class="text-muted">Hours logged by the administrator for your work.</p>
            </div>
            <div id="myHoursSection"></div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('bs_token');
        const user = JSON.parse(localStorage.getItem('bs_user') || 'null');
        if (!token || !user) { window.location.href = '/'; }
        if (user && user.is_admin) { window.location.href = '/admin'; }

        document.getElementById('navUser').textContent = user ? user.display_name : '';

        const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
        }

        function statusLabel(s) {
            if (s === 'yes') return 'Attending';
            if (s === 'maybe') return 'Maybe';
            if (s === 'no') return 'Not Attending';
            return 'No Response';
        }

        function statusClass(s) {
            if (s === 'yes') return 'status-yes';
            if (s === 'maybe') return 'status-maybe';
            if (s === 'no') return 'status-no';
            return 'status-none';
        }

        function fmtTime(t) {
            const [h, m] = t.split(':');
            const hr = parseInt(h);
            const ampm = hr >= 12 ? 'PM' : 'AM';
            const h12 = hr % 12 || 12;
            return `${h12}:${m} ${ampm}`;
        }

        async function loadEvents() {
            const res = await fetch('/api/events', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.status === 401) { logout(); return; }
            const events = await res.json();
            renderCalendar(events);
        }

        function renderCalendar(events) {
            const grid = document.getElementById('calendarGrid');
            // Group by month
            const byMonth = {};
            events.forEach(ev => {
                const month = ev.date.substring(0, 7);
                if (!byMonth[month]) byMonth[month] = [];
                byMonth[month].push(ev);
            });

            let html = '';
            for (const [month, evts] of Object.entries(byMonth)) {
                const d = new Date(month + '-15');
                html += `<div class="month-section">
                    <h3 class="month-title">${MONTHS[d.getMonth()]} ${d.getFullYear()}</h3>
                    <div class="events-list">`;
                evts.forEach(ev => {
                    const isPast = new Date(ev.date + 'T23:59:59') < new Date();
                    const statusBorder = ev.my_status === 'yes' ? 'event-card-yes' : ev.my_status === 'maybe' ? 'event-card-maybe' : ev.my_status === 'no' ? 'event-card-no' : '';
                    html += `
                    <div class="event-card ${isPast ? 'event-past' : ''} ${statusBorder}">
                        <div class="event-info">
                            <div class="event-date">${formatDate(ev.date)}</div>
                            <div class="event-time">${fmtTime(ev.start_time)} - ${fmtTime(ev.end_time)} &middot; ${escapeHtml(ev.title)}</div>
                            <div class="event-meta">
                                <span class="badge ${statusClass(ev.my_status)}">${statusLabel(ev.my_status)}</span>
                                <span class="spots-info">${ev.yes_count}/${ev.max_capacity} confirmed</span>
                                ${ev.at_capacity && ev.my_status !== 'yes' ? '<span class="capacity-full">Full</span>' : ''}
                            </div>
                        </div>
                        ${!isPast ? `
                        <div class="event-actions">
                            <button class="btn-rsvp ${ev.my_status === 'yes' ? 'active' : ''}" onclick="rsvp('${ev.date}','yes')" ${ev.at_capacity && ev.my_status !== 'yes' ? 'disabled title="At capacity"' : ''}>
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.3 4.3L6.5 11.1 2.7 7.3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                Yes
                            </button>
                            <button class="btn-rsvp btn-maybe ${ev.my_status === 'maybe' ? 'active' : ''}" onclick="rsvp('${ev.date}','maybe')">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2"/><path d="M8 5v3M8 10v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                                Maybe
                            </button>
                            <button class="btn-rsvp btn-no ${ev.my_status === 'no' ? 'active' : ''}" onclick="rsvp('${ev.date}','no')">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                                No
                            </button>
                        </div>` : '<div class="event-actions"><span class="text-muted">Past</span></div>'}
                    </div>`;
                });
                html += `</div></div>`;
            }
            grid.innerHTML = html;
        }

        async function rsvp(date, status) {
            const res = await fetch('/api/rsvp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token,
                },
                body: JSON.stringify({ date, status }),
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.error || 'Failed to update');
                return;
            }
            loadEvents();
        }

        function logout() {
            localStorage.removeItem('bs_token');
            localStorage.removeItem('bs_user');
            window.location.href = '/';
        }

        async function loadAnnouncements() {
            const res = await fetch('/api/announcements', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) return;
            const anns = await res.json();
            const container = document.getElementById('announcementsBanner');
            if (anns.length === 0) { container.innerHTML = ''; return; }
            let html = '<div class="announcements-section"><h3 class="section-label">Announcements</h3>';
            anns.forEach(a => {
                const date = new Date(a.created_at + 'Z');
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                html += `<div class="announcement-card">
                    <div class="ann-header">
                        <span class="ann-title">${escapeHtml(a.title)}</span>
                        <span class="ann-date">${dateStr}</span>
                    </div>
                    <p class="ann-body">${escapeHtml(a.body)}</p>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadMyHours() {
            const res = await fetch('/api/hours', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) return;
            const hours = await res.json();
            const container = document.getElementById('myHoursSection');

            if (hours.length === 0) {
                container.innerHTML = '<p class="text-muted">No hours logged yet.</p>';
                return;
            }

            const total = hours.reduce((sum, h) => sum + h.hours, 0);

            let html = `<div class="hours-summary">
                <span class="hours-total-label">Total Hours:</span>
                <span class="hours-total-value">${total.toFixed(1)}</span>
            </div>`;

            html += '<div class="hours-list">';
            hours.forEach(h => {
                html += `<div class="hours-entry">
                    <div class="hours-entry-info">
                        <div class="event-date">${formatDate(h.work_date)}</div>
                        <div class="event-time">${escapeHtml(h.description || 'No description')}</div>
                    </div>
                    <div class="hours-entry-value">${h.hours}h</div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function loadProfile() {
            const res = await fetch('/api/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) return;
            const me = await res.json();
            document.getElementById('navHours').textContent = me.total_hours.toFixed(1) + 'h';
            document.getElementById('titleCardValue').textContent = me.executive_title || 'Jr. Tutor';
            document.getElementById('titleCardName').textContent = me.display_name;
        }

        loadProfile();
        loadEvents();
        loadAnnouncements();
        loadMyHours();
    </script>
</body>
</html>
